<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>📚 读书笔记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
  color: #333;
}
.container { max-width: 1200px; margin: 0 auto; }
header { text-align: center; margin-bottom: 50px; color: white; }
header h1 { font-size: 42px; margin-bottom: 10px; font-weight: 700; }
header p { font-size: 18px; opacity: 0.9; }
.stats { display: flex; justify-content: center; gap: 60px; margin: 40px 0; }
.stat-item { text-align: center; color: white; }
.stat-number { font-size: 48px; font-weight: 700; display: block; }
.stat-label { font-size: 14px; opacity: 0.8; margin-top: 5px; }
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; margin-top: 40px; }
.book-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); transition: all 0.3s ease; cursor: pointer; text-decoration: none; color: inherit; display: block; }
.book-card:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.book-cover { height: 200px; background: linear-gradient(135deg, #8b5e3c, #c49a6c); display: flex; align-items: center; justify-content: center; font-size: 80px; position: relative; }
.book-cover::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.3) 100%); }
.book-cover span { position: relative; z-index: 1; }
.book-info { padding: 25px; }
.book-title { font-size: 22px; font-weight: 700; color: #2c2416; margin-bottom: 8px; line-height: 1.4; }
.book-author { font-size: 14px; color: #7a6f5e; margin-bottom: 15px; }
.book-desc { font-size: 14px; color: #5a5045; line-height: 1.6; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.book-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.book-tag { background: #faf7f2; color: #8b5e3c; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
.book-date { font-size: 12px; color: #9a8f7e; margin-top: 15px; }
@media (max-width: 768px) {
  header h1 { font-size: 32px; }
  .stats { gap: 30px; }
  .stat-number { font-size: 36px; }
  .book-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 读书笔记</h1>
    <p>每一本书都是一次思维重构</p>
    <div class="stats">
      <div class="stat-item"><span class="stat-number">1</span><div class="stat-label">已读书籍</div></div>
      <div class="stat-item"><span class="stat-number">1</span><div class="stat-label">读书笔记</div></div>
      <div class="stat-item"><span class="stat-number">∞</span><div class="stat-label">持续更新</div></div>
    </div>
  </header>
  <div class="book-grid">
    <a href="anti-inflammatory-ppt.html?v=3" class="book-card">
      <div class="book-cover"><span>🌿</span></div>
      <div class="book-info">
        <h2 class="book-title">抗炎生活</h2>
        <p class="book-author">[日] 池谷敏郎 · 日本心血管疾病权威专家</p>
        <p class="book-desc">慢性炎症是万病之源。本书从医学角度深入浅出地讲解炎症机制，并提供实用的抗炎生活方式指南。</p>
        <div class="book-tags">
          <span class="book-tag">健康</span>
          <span class="book-tag">营养学</span>
          <span class="book-tag">生活方式</span>
        </div>
        <p class="book-date">📅 2026-03-25</p>
      </div>
    </a>
  </div>
</div>
</body>
</html>
