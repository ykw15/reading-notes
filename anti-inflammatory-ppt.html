<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抗炎生活 - PPT读书笔记</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0ebe3; min-height: 100vh; }
.navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e8dfd3; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 100; }
.brand { font-size: 18px; font-weight: 700; color: #8b5e3c; text-decoration: none; }
.back-btn { background: #8b5e3c; color: #fff; padding: 8px 20px; border-radius: 30px; text-decoration: none; font-size: 14px; }
.ppt-container { padding-top: 60px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.slide-wrapper { width: 100%; max-width: 1000px; aspect-ratio: 16/10; position: relative; overflow: hidden; margin: 20px; }
.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); padding: 50px 60px; opacity: 0; transform: translateX(100%); transition: all 0.5s ease; overflow-y: auto; }
.slide.active { opacity: 1; transform: translateX(0); }
.slide.prev { opacity: 0; transform: translateX(-100%); }
.slide-title { font-size: 36px; color: #8b5e3c; margin-bottom: 8px; border-bottom: 3px solid #e07b4f; padding-bottom: 15px; }
.slide-subtitle { font-size: 18px; color: #7a6f5e; margin-bottom: 30px; }
.nav-hint { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; align-items: center; background: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 100; }
.nav-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #8b5e3c; color: white; font-size: 20px; cursor: pointer; }
.nav-btn:hover { background: #e07b4f; }
.nav-btn:disabled { background: #ccc; }
.page-indicator { font-size: 16px; color: #7a6f5e; min-width: 80px; text-align: center; }
@media (max-width: 768px) { .slide-wrapper { aspect-ratio: auto; min-height: calc(100vh - 60px); margin: 0; } .slide { padding: 30px 20px; border-radius: 0; } }
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="brand">📚 读书笔记</a>
  <a href="index.html" class="back-btn">← 返回书架</a>
</nav>
<div class="ppt-container">
  <div class="slide-wrapper" id="slideWrapper">
    <div class="slide active" data-index="0">
      <div style="text-align: center; padding-top: 80px;">
        <div style="font-size: 80px; margin-bottom: 30px;">🌿</div>
        <h1 style="font-size: 48px; color: #8b5e3c; margin-bottom: 20px;">抗炎生活</h1>
        <p style="font-size: 24px; color: #7a6f5e; margin-bottom: 40px;">完整知识体系</p>
        <p style="font-size: 18px; color: #7a6f5e;">作者：[日]池谷敏郎</p>
      </div>
    </div>
    <div class="slide" data-index="1">
      <h2 class="slide-title">核心公式</h2>
      <p class="slide-subtitle">记住这三个等式</p>
      <div style="background: linear-gradient(135deg, #8b5e3c, #e07b4f); color: white; padding: 30px; border-radius: 12px; text-align: center; margin: 25px 0;">
        <h3 style="font-size: 26px; margin-bottom: 10px;">抗炎 = 抗氧 = 抗衰老</h3>
      </div>
      <div style="background: linear-gradient(135deg, #1e3a5f, #2a4a7a); color: white; padding: 30px; border-radius: 12px; text-align: center; margin: 25px 0;">
        <h3 style="font-size: 26px; margin-bottom: 10px;">抗炎 = 抗疲劳 + 抗衰老 + 抗压</h3>
      </div>
    </div>
    <div class="slide" data-index="2">
      <h2 class="slide-title">炎症的本质</h2>
      <p class="slide-subtitle">四大特征</p>
      <ul style="font-size: 18px; line-height: 2; color: #5a5045;">
        <li>🔴 发红 - 血管扩张</li>
        <li>⚫ 肿胀 - 液体渗出</li>
        <li>🌡️ 发热 - 代谢增强</li>
        <li>⚡ 疼痛 - 神经刺激</li>
      </ul>
    </div>
  </div>
</div>
<div class="nav-hint">
  <button class="nav-btn" id="prevBtn" onclick="goToPrev()">←</button>
  <span class="page-indicator" id="pageIndicator">1 / 3</span>
  <button class="nav-btn" id="nextBtn" onclick="goToNext()">→</button>
</div>
<script>
var currentSlide = 0;
var totalSlides = 3;
function updateSlide() {
  var slides = document.querySelectorAll('.slide');
  slides.forEach(function(slide, index) {
    slide.classList.remove('active', 'prev');
    if (index === currentSlide) slide.classList.add('active');
    else if (index < currentSlide) slide.classList.add('prev');
  });
  document.getElementById('pageIndicator').textContent = (currentSlide + 1) + ' / ' + totalSlides;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
}
function goToNext() { if (currentSlide < totalSlides - 1) { currentSlide++; updateSlide(); } }
function goToPrev() { if (currentSlide > 0) { currentSlide--; updateSlide(); } }
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goToNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goToPrev(); }
});
var touchStartX = 0;
var slideWrapper = document.getElementById('slideWrapper');
slideWrapper.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
slideWrapper.addEventListener('touchend', function(e) {
  var diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 50) { if (diff > 0) goToNext(); else goToPrev(); }
}, {passive: true});
updateSlide();
</script>
</body>
</html>
